<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4択ポケモンクイズ</title>

<style>
body {
  font-family: sans-serif;
  background: #f4f4f4;
  text-align: center;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 600px;
  margin: 50px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 15px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.choice {
  background: #e0e0e0;
}

.choice:hover {
  background: #cfcfcf;
}

#startBtn {
  background: #4caf50;
  color: white;
}

#nextBtn {
  background: #2196f3;
  color: white;
  display: none;
}

#result {
  font-size: 20px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<h1>4択ポケモンクイズ</h1>

<div id="quiz">
  <h2 id="question">準備中...</h2>
  <div id="choices"></div>

  <button id="nextBtn" onclick="nextQuestion()">次へ</button>
</div>

<div id="startScreen">
  <button id="startBtn" onclick="startQuiz()">スタート</button>
</div>

<div id="result"></div>

</div>

<script>
// 問題データ
const quizData = [
  {
    question: "ピカチュウの進化前は？",
    choices: ["ピチュー", "ライチュウ", "イーブイ", "プリン"],
    answer: 0
  },
  {
    question: "ヒトカゲの最終進化は？",
    choices: ["リザードン", "カメックス", "フシギバナ", "バクフーン"],
    answer: 0
  },
  {
    question: "みずタイプの御三家はどれ？",
    choices: ["ゼニガメ", "ヒトカゲ", "ピカチュウ", "イシツブテ"],
    answer: 0
  },
  {
    question: "ポケモンの初代は何匹？",
    choices: ["151匹", "100匹", "200匹", "251匹"],
    answer: 0
  }
];

let current = 0;
let score = 0;

function startQuiz() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  showQuestion();
}

function showQuestion() {
  let q = quizData[current];
  document.getElementById("question").textContent = q.question;

  let choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  q.choices.forEach((choice, index) => {
    let btn = document.createElement("button");
    btn.textContent = choice;
    btn.className = "choice";
    btn.onclick = () => selectAnswer(index);
    choicesDiv.appendChild(btn);
  });

  document.getElementById("nextBtn").style.display = "none";
}

function selectAnswer(index) {
  let correct = quizData[current].answer;

  if (index === correct) {
    score++;
  }

  document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion() {
  current++;

  if (current < quizData.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("quiz").innerHTML =
    "<h2>終了！</h2><p>スコア: " + score + " / " + quizData.length + "</p>";
}
</script>

</body>
</html>
